<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#08080c" />
  <title>Flock 3D</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- Tone.js (UMD global) -->
  <script src="https://unpkg.com/tone@14.8.49/build/Tone.js"></script>
</head>
<body>
  <!-- 开始按钮：浏览器要求用户手势后才能播音频 -->
  <div id="start-overlay">
    <div id="start-card">
      <h1>Flock 3D</h1>
      <p>Particle swarm × Synthesis</p>
      <button id="start-btn">点击进入 / TAP TO START</button>
      <p class="hint">建议戴耳机 · use headphones</p>
    </div>
  </div>

  <!-- 实际画布会被 Three.js 注入 -->

  <!-- HUD：左下显示 fps + cluster 数 -->
  <div id="hud"></div>

  <!-- 帮助提示 -->
  <div id="help" style="display:none">
    <kbd>drag</kbd> rotate · <kbd>pinch/wheel</kbd> zoom · <kbd>H</kbd> hide GUI
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
